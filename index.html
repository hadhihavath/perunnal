<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>പെരുന്നാൾ ഡയറി Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #1a2e1a; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .emerald-gradient { background: linear-gradient(135deg, #064e3b 0%, #065f46 100%); }
        /* Mobile Frame Styling */
        .phone-frame {
            width: 375px;
            height: 812px;
            outline: 12px solid #222;
            border-radius: 50px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #222;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 50;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="phone-frame bg-gray-50 flex flex-col">
        <div class="notch"></div>
        
        <div class="emerald-gradient pt-12 pb-6 px-6 text-white shrink-0">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-2xl font-bold">പെരുന്നാൾ ഡയറി</h1>
                <i data-lucide="bell" class="w-6 h-6 opacity-80"></i>
            </div>
            <p class="text-emerald-100 text-sm">നിങ്ങളുടെ തികഞ്ഞ പെരുന്നാൾ കൂട്ടുകാരൻ</p>
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-4 pb-24">
            
            <div class="bg-white rounded-3xl p-5 shadow-sm border border-emerald-100">
                <div class="flex items-center justify-between mb-3">
                    <span class="bg-emerald-100 text-emerald-800 text-xs font-bold px-3 py-1 rounded-full uppercase">അടുത്ത നിസ്കാരം</span>
                    <span class="text-gray-400 text-xs">Today, 5 Mar</span>
                </div>
                <div class="flex items-end justify-between">
                    <div>
                        <h2 class="text-3xl font-bold text-gray-800">07:30 <span class="text-lg">AM</span></h2>
                        <p class="text-gray-500 font-medium">ഈദ് നിസ്കാരം (Eid-ul-Fitr)</p>
                    </div>
                    <button id="takbeerBtn" onclick="toggleTakbeer()" class="bg-amber-400 hover:bg-amber-500 text-amber-900 p-4 rounded-2xl transition-all shadow-lg shadow-amber-200">
                        <i data-lucide="play" id="playIcon"></i>
                    </button>
                </div>
                <p id="takbeerStatus" class="text-[10px] mt-3 text-emerald-700 font-bold hidden italic text-center">തക്ബീർ പ്ലേ ചെയ്യുന്നു...</p>
            </div>

            <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-emerald-100">
                <div class="p-4 flex items-center gap-2">
                    <i data-lucide="map-pin" class="w-5 h-5 text-emerald-600"></i>
                    <span class="font-bold text-gray-700">അടുത്തുള്ള പള്ളികൾ</span>
                </div>
                <div class="h-32 bg-emerald-50 relative flex items-center justify-center">
                    <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#065f46 1px, transparent 1px); background-size: 20px 20px;"></div>
                    <div class="relative text-center">
                        <div class="flex gap-4">
                            <div class="animate-bounce"><i data-lucide="map-pin" class="text-red-500 fill-current"></i></div>
                            <div class="animate-bounce" style="animation-delay: 0.2s"><i data-lucide="map-pin" class="text-emerald-600 fill-current"></i></div>
                        </div>
                        <p class="text-[10px] text-gray-500 mt-1">സിറ്റി ഈദ്‌ഗാഹ് (1.2 km അകലെ)</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-emerald-50 p-4 rounded-3xl border border-emerald-100">
                    <p class="text-[10px] uppercase font-bold text-emerald-700 mb-1">നൽകിയ ഈദി</p>
                    <div class="flex items-center justify-between">
                        <span class="text-xl font-bold text-emerald-900">₹<span id="eidiOut">500</span></span>
                        <button onclick="updateEidi('eidiOut', 50)" class="bg-white p-1 rounded-lg shadow-sm text-emerald-600">+</button>
                    </div>
                </div>
                <div class="bg-amber-50 p-4 rounded-3xl border border-amber-100">
                    <p class="text-[10px] uppercase font-bold text-amber-700 mb-1">ലഭിച്ച ഈദി</p>
                    <div class="flex items-center justify-between">
                        <span class="text-xl font-bold text-amber-900">₹<span id="eidiIn">1200</span></span>
                        <button onclick="updateEidi('eidiIn', 100)" class="bg-white p-1 rounded-lg shadow-sm text-amber-600">+</button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-3xl p-5 shadow-sm border border-emerald-100">
                <h3 class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                    <i data-lucide="utensils" class="w-4 h-4"></i> സൽക്കാരം പ്ലാനർ
                </h3>
                <div class="space-y-2">
                    <label class="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-xl cursor-pointer">
                        <input type="checkbox" class="w-5 h-5 accent-emerald-600" checked>
                        <span class="text-sm text-gray-600">തലശ്ശേരി ബിരിയാണി</span>
                    </label>
                    <label class="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-xl cursor-pointer">
                        <input type="checkbox" class="w-5 h-5 accent-emerald-600">
                        <span class="text-sm text-gray-600">നെയ്പത്തിരി & ചിക്കൻ കറി</span>
                    </label>
                    <label class="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-xl cursor-pointer">
                        <input type="checkbox" class="w-5 h-5 accent-emerald-600">
                        <span class="text-sm text-gray-600">ഉന്നക്കായ & ഈത്തപ്പഴം</span>
                    </label>
                </div>
            </div>

        </div>

        <div class="absolute bottom-0 w-full glass border-t border-gray-100 px-8 py-4 flex justify-between items-center z-40">
            <i data-lucide="home" class="w-6 h-6 text-emerald-700"></i>
            <i data-lucide="gift" class="w-6 h-6 text-gray-400"></i>
            <div class="bg-emerald-700 p-3 rounded-full -mt-12 shadow-lg border-4 border-gray-50">
                <i data-lucide="plus" class="w-6 h-6 text-white"></i>
            </div>
            <i data-lucide="users" class="w-6 h-6 text-gray-400"></i>
            <i data-lucide="settings" class="w-6 h-6 text-gray-400"></i>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Takbeer Toggle Logic
        let isPlaying = false;
        function toggleTakbeer() {
            isPlaying = !isPlaying;
            const btn = document.getElementById('takbeerBtn');
            const icon = document.getElementById('playIcon');
            const status = document.getElementById('takbeerStatus');
            
            if(isPlaying) {
                icon.setAttribute('data-lucide', 'pause');
                btn.classList.add('animate-pulse');
                status.classList.remove('hidden');
            } else {
                icon.setAttribute('data-lucide', 'play');
                btn.classList.remove('animate-pulse');
                status.classList.add('hidden');
            }
            lucide.createIcons();
        }

        // Eidi Counter Logic
        function updateEidi(id, amount) {
            const el = document.getElementById(id);
            let current = parseInt(el.innerText);
            el.innerText = current + amount;
        }
    </script>
</body>
</html>
